# /docker-compose.yml
services:
  ruvsarpur-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: ruvsarpur-api
    environment:
      RUVSARPUR_GUI_HOST: 0.0.0.0
      RUVSARPUR_GUI_PORT: 8000
      RUVSARPUR_GUI_PORTABLE: "1"
    volumes:
      - ./data:/data
    expose:
      - "8000"
    restart: unless-stopped

  ruvsarpur-web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ""
    environment:
      # Purpose: backend target used by nginx reverse proxy at runtime.
      API_UPSTREAM: ruvsarpur-api:8000
      # Effect: docker embedded DNS resolver for service-name lookups.
      NGINX_RESOLVER: 127.0.0.11
    container_name: ruvsarpur-web
    depends_on:
      - ruvsarpur-api
    ports:
      - "8080:80"
    restart: unless-stopped
